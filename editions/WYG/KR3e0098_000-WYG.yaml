body:
  text: 神農本草經百種録醫家類提要臣等謹案神農本草經百種録一卷國朝徐大椿撰大椿字靈胎號洄溪呉江人世傳神農本草經三卷載藥三百六十五味分上中下三品今單行之本不傳惟見於唐慎㣲本草所載其刋本以隂文書者皆其原文也大椿以舊註但言其當然不言其所以然因于三品之中採掇一百種備列經文而推闡主治之義有常用之藥而反不収入者其凡例謂辨明藥性使人不致誤用非備品以便查閲也凡所箋釋多有精意較李時珍本草綱目所載發明諸條頗為簡要然本草雖稱神農而所云出産之地乃時有後漢之郡縣則後人附益者多如所稱久服輕身延年之類率方士之説不足盡信大椿尊崇太過亦一一究其所以然殊為附會又大椿所作藥性專長論曰藥之治病有可解者有不可解者其説最為圓通則是書所論猶屬筌蹄之末要於諸家本草中為有啓發之功者矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀神農本草經百種録原序百物與人殊體而人藉以養生却病者何也蓋天地亦物耳惟其形體至大則不能無生其生人也得其純其生動物也得其雜其生植物也得其偏顧人之所謂純者其初生之理然耳及其感風寒暑濕之邪喜怒憂思之擾而純者遂漓漓則氣傷氣傷則形敗而物之雜者偏者反能以其所得之性補之救之聖人知其然也思救人必先知物盖氣不能違理形不能違氣視色别味察聲辨臭權輕重度長短審形之事也測時令詳嗜好分盛衰别土宜求氣之術也形氣得而性以得性者物所生之理也由是而立本草製湯劑以之治人有餘㵼之不足補之寒者熱之熱者寒之温者清之清者温之從者反治逆者正治或以類從或以畏忌各矯其弊以復於平其始則異其終則同夫天地生之聖人保之造化之能聖人半之天地不能專也漢末張仲景金匱要畧及傷寒論中諸方大半皆三代以前遺法其用藥之義與本經脗合無間審病施方應騐如響自唐以後藥性不明方多自撰如千金方外臺秘要之屬執藥治病氣性雖不相背而變化已鮮沿及宋元藥品日増性未研極師心自用謬誤相仍即用本經諸種其精㣲妙義多所遺漏是以方不成方藥非其藥間有效騐亦偶中而非可取必良由本經之不講故也余竊悲焉欲詳為闡述其如耳目所及無多古今名實互異地土殊産氣味不同且近世醫人所不常用之藥無識别而收採者更有殊能異性義在隱微一時難以推測若必盡解全經不免昧心誣聖是以但擇耳目所習見不疑而理有可測者共得百種為之探本溯源發其所以然之義使古聖立方治病之心灼然可見而其他則闕焉後之君子或可因之而悟其全雖荒陋可嗤而敬慎足矜也乾隆元年歲在柔兆執徐余月上弦松陵徐大椿題於揚子江舟次凡例一録此百種原以辨明藥性闡發義藴使讀者深識其所以然因此悟彼方藥不致悞用非備品以便查閱也覽者勿以不載常用之藥為疑一諸藥有獨具之性者則用詳解其兼長可互見者俱不重出推類自明一此解亦間有與前人相同者但彼秖釋其所當然而未推測其所以然知所當然則用古之方能不失古人之意知所以然則方可自製而亦能合古人製方之意也故此解皆著其所以然之故而淺近易曉者則畧焉一所解諸藥乃就市中所有審形辨味以合經義至古今土産各殊或有尚非正義與尚有遺義者則俟知者正之一諸藥有所出地名雜以後漢時郡縣陶隱居疑為仲景元化等所記是本經所載已不皆神農以來所産之地矣今之所産又大半非漢時所産之地欲盡考其實固無從也故不復列而解之一本經所載一名甚多因無可解故亦不列一品第及字樣俱依明重刻宋大觀刋唐慎微本所載白字本經考陶隱居本草有朱書墨書之别朱書為神農本經墨書為名醫别録開寳間重定印本於本經易朱書為白字大觀本遵之雖未必無傳訛而取其近古猶勝於近刻也一詳解止此百種餘亦頗有畧為解者以資人者淺一㮣不存欽定四庫全書神農本草經百種録呉江徐大椿撰上品丹砂味甘㣲寒甘言味寒言性何以不言色與氣蓋入口則知其味入腹則知其性若色與氣則在下文主治之中可推而知之也主身體五藏百病百病者凡病皆可用無所禁忌非謂能治天下之病也凡和平之藥皆如此養精神凡精氣所結之物皆足以養精神人與天地同此精氣以類相益也安魂魄赤入心重鎮怯益氣氣降則藏藏則益明目凡石藥皆能明目石者金氣所凝目之能鑒物亦金氣所成也又五藏之精皆上注于目目大小眥屬心丹砂益目中心藏之精殺精魅邪惡鬼大赤為天地純陽之色故足以辟隂邪久服通神明不老能化為汞石屬金汞亦金之精也凡上品之藥皆得天地五行之精以成其質人身不外隂陽五行采其精氣以補真元則神靈通而形質固矣但物性皆偏太過不及翻足為害苟非通乎造化之㣲者未有試而不斃者也此因其色與質以知其效者丹砂正赤為純陽之色心屬火色赤故能入心而統治心經之證其質重故又有鎮墜氣血之能也凡藥之用或取其氣或取其味或取其色或取其形或取其質或取其性情或取其所生之時或取其所成之地各以其所偏勝而即資之療疾故能補偏救弊調和藏府深求其理可自得之雲母味甘平主身皮死肌雲母色白屬金故為肺經之藥又肺主皮毛雲母薄叠如皮亦與肺合也中風寒熱如在車船上肺氣震蕩此能鎮之除邪氣安五藏亦靖鎮之功益子精肺為腎源明目目白屬肺此能益目中肺藏之精久服輕身延年肺旺則氣旺故有此效雲母雖有五色而白其正色也白屬金金生水故雲母之上常生雲氣雲者地氣上升欲為雨而未成雨者也肺屬金而在上為人身水源與雲母相類故為肺經之藥石鍾乳味甘温主欬逆上氣鍾乳石體屬金又其象下垂而中空故能入肺降逆明目能益目中肺藏之精益精能引肺氣入腎安五藏通百節利九竅降氣則藏安中虛則竅通下乳汁鍾乳即石汁如乳者所溜而成與乳為類故能下乳汁也此以形為治石為土中之金鍾乳石液所凝乃金之液也故其功專于補肺以其下垂故能下氣以其中空故能通竅又肺朝百脈肺氣利則無所不利矣自唐以前多以鍾乳為服食之藥以其能直達腎經驟長陽氣合諸補腎之品用于房中之術最效但此乃深巖幽谷之中水溜凝結而成所謂金中之水其體至隂而石藥多悍性反屬陽故能補人身隂中之火隂火一發莫可制伏故久服毒發至不可救惟昇煉得宜因證施治以交肺腎子母之藏實有殊能也礬石味酸寒礬石味澀而云酸者蓋五味中無澀澀即酸之變味澀味收斂亦與酸同如五色中之紫即紅之變色也主寒熱寒熱為肝經之疾酸能收斂肝氣洩痢白沃亦收澀之功隂蝕惡瘡味烈性寒故能殺濕熱之蟲除濕熱之毒目痛制火清金堅骨齒斂氣固精鍊餌服之輕身不老増年此以味為治礬石之味最烈而獨成一味故其功皆在于味朴消味苦寒朴消味鹹而云苦者或古時所産之地與今不同故味異耶抑或以鹹極而生苦也主百病除寒熱邪氣邪氣凝結則生寒熱消味鹹苦能輭堅而解散之逐六府積聚結固留癖消質重性輕而能透發鬱結置金石器中尚能滲出故遇積聚等邪無不消解也能化七十二種石此輭堅之甚者鍊餌服之輕身神仙消盡人身之滓穢以存其精華故有此效消者消也朴消乃至隂之精而乗陽以出其本水也其標火也遇濕則化為水遇火則升為火體最清而用最變故丹家重之石屬金消遇火則亦變火蓋無火之性而得火之精氣者也火鑠金故能化石滑石味甘寒主身熱寒能除熱洩澼滑石能滑利大小腸分清水榖水榖分則洩澼愈矣女子乳難乳亦水類滑石利水且能潤竅故有通乳之功癃閉利小便滑利小腸蕩胃中積聚寒熱滑利大腸凡積聚寒熱由蓄飲垢膩成者皆能除之益精氣邪去則津液自生久服輕身耐飢長年通利之藥皆益胃氣胃氣利則其效如此此以質為治凡石性多燥而滑石體最滑潤得石中隂和之性以成故通利腸胃去積除水解熱降氣石藥中之最和平者也禹餘糧味甘寒主欬逆補中降氣不使上逆寒熱除脾胃氣虛及有濕滯之寒熱煩滿補脾之功下赤白質燥性寒故能除濕熱之疾血閉癥瘕消濕熱所滯之瘀積大熱熱在陽明者必甚此能除之鍊餌服之不飢其質類穀粉而補脾土所以謂之糧而能充飢也輕身延年補養後天之效禹餘糧色黄質膩味甘乃得土氣之精以生者也故補益脾胃除熱燥濕之功為多凡一病各有所因治病者必審其因而治之所謂求其本也如同一寒熱也有外感之寒熱有内傷之寒熱有雜病之寒熱若禹餘糧之所治乃脾胃濕滯之寒熱也後人見本草有治寒熱之語遂以治凡病之寒熱則非惟不效而且有害自宋以來徃徃蹈此病皆本草不講之故耳紫石英味甘温主心腹欬逆甘能和中重能降氣邪氣散風寒補不足補心血之不足女子風寒在子宫絶孕十年無子子宫屬衝脈血海風寒入于其中他藥所不能及紫石英色紫入血分體重能下達故能入于衝脈之底風寒妨孕温能散寒驅風也久服温中輕身延年補血納氣之功此以色為治色紫則入心心主血故能補血其降氣而能入下焦則質重之效也青石赤石黄石白石黑石脂等味甘平主黄疸洩痢腸澼膿血隂蝕皆濕氣在太隂陽明之病也下血赤白收澀之功邪氣正氣斂則邪氣除癰腫疽痔惡瘡頭瘍疥瘙此皆濕鬱所生之毒能除濕則諸病亦退久服補髓益氣肥健不飢輕身延年斂精氣而燥脾土故有此效五石脂各隨五色補五藏性治畧同而所補之藏各異石脂得金土雜氣以成故濕土之質而有燥金之用脾惡濕燥能補之然其質屬土不至過燥又得秋金斂藏之性乃治濕之聖藥也扁青味甘平主目痛明目養肝之功折跌癰腫金瘡不瘳收澀斂肌之功破積聚消肝邪也解毒氣利精神久服輕身不老精氣所結之物故能除毒益精増年也内經云五藏六府之精皆上注于目故目雖屬肝之竅而白乃肺之精也五行之中火能舒光照物而不能鑒物惟金之明乃能鑒物石體屬金故石藥皆能明目而扁青生于山之有金處蓋金氣精華之所結也又色青屬肝于目疾尤宜凡草木中得秋金之氣者亦然凡物精華所結者皆得天地清粹之氣以成而穢濁不正之氣不得干之故皆有解毒之功其非精華所結而亦能解毒者則必物性之相制或以毒攻毒也菖蒲味辛温主風寒辛能散風温能驅寒濕痺芳燥能除濕欬逆上氣開竅下逆開心孔香入心補五藏氣通和則補益通九竅明耳目出音聲芳香清烈故走達諸竅而和通之耳目喉嚨皆竅也久服輕身氣不阻滯則身體通利不忘不迷惑延年氣通則津液得布故不但能開竅順氣且能益精養神也菖蒲能于水石中横行四達辛烈芳香則其氣之盛可知故入于人身亦能不為濕滯痰涎所阻凡物之生于天地間氣性何如則入于人身其奏效亦如之蓋人者得天地之和氣以生其氣血之性肖乎天地故以物性之偏者投之而亦無不應也餘可類推菊花味苦平主風頭眩腫痛目欲脫淚出芳香上達又得秋金之氣故能平肝風而益金水皮膚死肌清肺疎風惡風濕痺驅風散濕久服利血氣輕身耐老延年菊花晩開晩落花中之最壽者也故其益人如此凡芳香之物皆能治頭目肌表之疾但香則無不辛燥者惟菊得天地秋金清肅之氣而不甚燥烈故于頭目風火之疾尤宜焉人參味甘微寒主補五藏安精神定魂魄止驚悸有形無形無一之不補也除邪氣正氣充則邪氣自除明目五藏六府之精皆上注于目此所云明乃補其精之效非若他藥專有明目之功也開心益智人參氣盛而不滯補而兼通故能入心孔而益神明也久服輕身延年補氣之功人參得天地精英純粹之氣以生與人之氣體相似故于人身無所不補非若他藥有偏長而治病各有其能也凡補氣之藥皆屬陽惟人參能補氣而體質屬隂故無剛燥之病而又能入于隂分最為可貴然力大而峻用之失宜其害亦甚于他藥也今醫家之用參救人者少殺人者多蓋人之死于虚者十之一二死于病者十之八九人參長于補虚而短于攻疾醫家不論病之已去未去于病久或體弱或富貴之人皆必用參一則過為謹慎一則借以塞責而病家亦以用參為盡慈孝之道不知病未去而用參則非獨元氣不充而病根遂固諸藥罔效終無愈期故曰殺人者多也或曰仲景傷寒方中病未去而用參者不少如小柴胡新加湯之類何也曰此則以補為瀉之法也古人曲審病情至精至密知病有分有合合者邪正併居當專于攻散分者邪正相離有虛有實實處宜瀉虚處宜補一方之中兼用無礙且能相濟則用人參以建中生津拓出邪氣更為有力若邪氣尚盛而未分必從專治無用參之法也况用之亦皆入疎散藥中從無與熟地茰肉等藥同入感證方中者明乎此而後能不以生人者殺人矣人參亦草根耳與人殊體何以能驟益人之精血蓋人參乃升提元氣之藥元氣下陷不能與精血流貫人參能提之使起如火藥藏于砲内不能升發則以火發之若砲中本無火藥雖以砲投火中不能發也此補之義也甘草味甘平主五藏六府寒熱邪氣甘能補中氣中氣旺則藏府之精皆能四布而驅其不正之氣也堅筋骨長肌肉倍力形不足者補之以味甘草之甘為土之正味而又最厚故其功如此金瘡尰脾主肌肉補脾則能填滿肌肉也解毒甘為味中之至正味正則氣性亦正故能除毒久服輕身延年補後天之功此以味為治也味之甘至甘草而極甘屬土故其效皆在于脾脾為後天之主五藏六府皆受氣焉脾氣盛則五藏皆循環受益也乾地黄味甘寒主折跌絶筋傷中逐血痺行血之功填骨髓血足能化精而色黑歸腎也長肌肉脾統血血充則肌肉亦滿矣作湯除寒熱積聚血充足則邪氣散血流動則凝滯消除痺血和利則經脈暢生者尤良血貴流行不貴滋膩故中古以前用熟地者甚少久服輕身不老補血之功地黄色與質皆類血故入人身則專于補血血補則隂氣得和而無枮燥拘牽之疾矣古方只有乾地黄生地黄從無用熟地黄者熟地黄乃唐以後製法以之加入温補腎經藥中頗為得宜若于湯劑及養血涼血等方甚屬不合蓋地黄專取其性涼而滑利流通熟則膩滯不涼全失其本性矣又仲景傷寒一百十三方惟復脈用地黄蓋傷寒之病邪從外入最忌滋滯即使用補必兼疎拓之性者方可入劑否則邪氣向裏必有遺害今人一見所現之證稍渉虚象便以六味湯為常用之品殺人如麻可勝長歎术味苦温主風寒濕痺死肌氣厚而兼辛散故能除邪而利筋脈肌膚也痙平肝風疸去濕止汗固肌膚除熱益脾隂消食健脾氣作煎餌久服輕身延年不飢脾胃充則體强健而不易飢也术者土之精也色黄氣香味苦而帶甘性温皆屬于土故能補益脾土又其氣甚烈而芳香四達故又能達于筋脈肌膚而不專于建中宫也菟絲子味辛平主續絶傷子中有絲不斷故能補續筋骨補不足益氣力肥健滑潤有脂膏自能生精益氣而長肌肉也汁去面䵟亦滑澤之功久服明目輕身延年生精則目明而强且壽也子中之最有脂膏者莫如菟絲且炒熟則芳香又潤而不滑故能補益肝脾也凡藥性有專長此在可解不可解之間雖聖人亦必試騐而後知之如菟絲之去面䵟亦其一端也以其辛散耶則辛散之藥甚多以其滑澤耶則滑澤之物亦甚多何以他藥皆不能去而獨菟絲能之蓋物之生各得天地一偏之氣故其性自有相制之理但顯于形質氣味者可以推測而知其深藏于性中者不可以常理求也故古人有單方及祕方徃徃以一二種藥治一病而得竒中及視其方皆不若經方之必有經絡竒偶配合之道而效反神速者皆得其藥之專能也藥中如此者極多可以類推牛膝味苦酸此止言味而不言性疑闕文也後凡不言性者倣此主寒濕痿痺四肢拘攣膝痛不可屈伸皆舒筋行血之功逐血氣破瘀血也傷熱火爛清血熱也墮胎降血氣也久服輕身耐老血和之功此乃以其形而知其性也凡物之根皆横生而牛膝獨直下其長細而韌酷似人筋所以能舒筋通脈下血降氣為諸下達藥之先導也筋屬肝肝藏血凡能舒筋之藥俱能治血故又為通利血脈之品茈胡味苦平主心腹去腸胃中結氣輕揚之體能疎腸胃之滯氣飲食積聚疎腸胃之滯物寒熱邪氣驅經絡之外邪推陳致新總上三者言之邪去則正復也久服輕身明目益精諸邪不能容則正氣流通故有此效茈胡腸胃之藥也觀經中所言治效皆主腸胃以其氣味輕清能于頑土中疎理滯氣故其功如此天下惟木能疎土前人皆指為少陽之藥是知其末而未知其本也張仲景小茈胡湯專治少陽以此為主藥何也按傷寒傳經次第先太陽次陽明次少陽然則少陽雖在太陽陽明之間而傳經乃居陽明之後過陽明而後入少陽則少陽反在陽明之内也蓋以所居之位言則少陽在太陽陽明之間以從入之道言則少陽在太陽陽明之内故治少陽與太陽絶不相干而與陽明為近如小茈胡湯之半夏甘草皆陽明之藥也惟其然故氣味須輕清疎達而後邪能透土以出知此則仲景用茈胡之義明而茈胡為腸胃之藥亦明矣麥門冬味甘平主心腹結氣解枯燥之結氣傷中傷飽胃絡脈絶補續胃中之隂氣羸瘦短氣補胃則生肌清火則益氣久服輕身不老不飢後天足則體健而能耐飢也麥冬甘平滋潤為純補胃隂之藥後人以為肺藥者蓋土能生金肺氣全恃胃隂以生胃氣潤肺自資其益也車前子味甘寒主氣癃止痛利水道小便專利下焦氣分除濕痺濕必由膀胱出下焦利則濕氣除久服輕身耐老氣順濕除則肢體康强也凡多子之藥皆屬腎故古方用入補腎藥中蓋腎者人之子宫也車前多子亦腎經之藥然以其質滑而氣薄不能全補則為腎府膀胱之藥膀胱乃腎氣輸洩之道路也木香味辛主邪氣辟毒疫温鬼氣極芳烈能除邪穢不祥也强志香氣通于心主淋露心與小腸為表裏心氣下交于小腸則便得調矣久服不夢寤魘寐心氣通則神魂定木香以氣勝故其功皆在乎氣内經云心主臭凡氣烈之藥皆入心木香香而不散則氣能下達故又能通其氣于小腸也薏苡仁味甘㣲寒主筋急拘攣不可屈伸風濕痺專除陽明之濕熱下氣直達下焦久服輕身益氣陽明氣利則體强而氣充也其根下三蟲除陽明濕熱所生之蟲薏苡仁甘淡冲和質類米榖又體重力厚故能補益胃氣舒筋除濕中虚故又能通降濕熱使下行蓋凡筋急痺痛等疾皆痿證之類内經治痿獨取陽明薏苡為陽明之藥故能已諸疾也澤瀉味甘寒主風寒濕痺凡挾水氣之疾皆能除之乳難乳亦水類故能通乳也消水使水歸于膀胱養五藏益氣力水氣除則藏安而氣生也肥健脾惡濕脾氣燥則肌肉充而肥健也久服耳目聰明不飢延年輕身面生光皆滌水除濕之功能行水上水氣盡則身輕而入水不没矣澤瀉乃通利脾胃之藥以其淡滲能利土中之水水去則土燥而氣充脾惡濕故也但濕氣必自膀胱而出澤瀉能下達膀胱故又為膀胱之藥逺志味苦温主欬逆氣滯之欬傷中補不足心主營營氣順則中焦自足除邪氣利九竅辛香疎達則能辟穢通竅也益智慧耳目聰明不忘强志心氣通則精足神全矣倍力心氣盛則脾氣亦强而力生也久服輕身不老氣和之效逺志氣味苦辛而芳香清烈無㣲不達故為心家氣分之藥心火能生脾土心氣盛則脾氣亦和故又能益中焦之氣也龍膽味苦澀主骨間寒熱治肝邪犯腎之寒熱驚癎邪氣肝火犯心之邪續絶傷斂筋骨之氣定五藏斂藏中之氣殺蠱毒除熱結之氣久服益智不忘收斂心中之神氣輕身耐老熱邪去而正氣歸故有此效藥之味澀者絶少龍膽之功皆在于澀此以味為主也澀者酸辛之變味兼金木之性者也故能清斂肝家之邪火人身惟肝火最横能下挾腎中之遊火上引包絡之相火相持為害肝火清則諸火漸息而百體清寜矣細辛味辛温主欬逆散肺經之風頭痛腦動散頭風百節拘攣風濕痺痛死肌散筋骨肌肉之風久服明目利九竅散諸竅之風輕身長年風氣除則身健而壽矣此以氣為治也凡藥香者皆能疎散風邪細辛氣盛而味烈其疎散之力更大且風必挾寒以來而又本熱而標寒細辛性温又能驅逐寒氣故其疎散上下之風邪能無微不入無處不到也石斛石斛其說不一出廬江六安者色青長二三寸如釵股世謂之金釵石斛折之有肉而實咀之有膩涎黏齒味甘淡此為最佳如市中長而黄色及枯槁無味者皆木斛也因近日無不悞用故附記于此味甘平主傷中培脾土除痺治肉痺下氣使中氣不失守補五藏虚勞後天得養則五藏皆補也羸瘦長肌肉强隂補脾隂久服厚腸胃腸胃為中藏之府輕身延年補益後天之效凡五味各有所屬甘味屬土然土實無味也故洪範論五行之味潤下作鹹炎上作苦曲直作酸從革作辛皆即其物言之惟于土則曰稼穡作甘不指土而指土之所生者可知土本無味也無味即為淡淡者五味之所從出即土之正味也故味之淡者皆屬土石斛味甘而實淡得土味之全故其功專補脾胃而又和平不偏也蓍實味苦平主益氣充肌膚得天地之和氣以生故亦能益人之正氣而强健也明目聰慧先知蓍草神物揲之能前知蓋得天地之靈氣以生故亦能益人之神明也久服不飢不老輕身氣足神全故有此效此因其物之所能以益人之能也昔聖人幽贊于神明而生蓍此草中之神物也服之則補人之神自能聰慧前知矣肉食者鄙不益信夫黄連味苦寒主熱氣除熱在氣分者目痛眥傷淚出明目除濕熱在上之病腸澼腹痛下痢除濕熱在中之病婦人隂中腫痛除濕熱在下之病久服令人不忘苦入心能補心也苦味屬火其性皆熱此固常理黄連至苦而反至寒則得火之味與水之性者也故能除水火相亂之病水火相亂者濕熱是也凡藥能去濕者必増熱能除熱者必不能去濕惟黄連能以苦燥濕以寒除熱一舉兩得莫神于此心屬火寒勝火則黄連宜為瀉心之藥而反能補心何也蓋苦為火之正味乃以味補之也若心家有邪火則此亦能瀉之而真火反得寜是瀉之即所以補之也苦之極者其性反寒即内經亢害承制之義所謂火盛之極反兼水化也黄芪味甘㣲温主癰疽久敗瘡排膿止痛除肌肉中之熱毒大風癩疾去肌肉中之風毒五痔鼠瘻去肌肉中之濕毒補虚補脾胃之虚小兒百病小兒當補後天後天者肌肉之本也黄芪甘淡而温得土之正味正性故其功專補脾胃味又微辛故能驅脾胃中諸邪其皮最厚故亦能補皮肉為外科生肌長肉之聖藥也肉蓯蓉陶隱居云是馬精落地所生後有此種則蔓延者也味甘微温主五勞七傷補中補諸精虚之證除莖中寒熱痛莖中者精之道路也精虚則有此痛補精則其病自己矣養五藏强隂益精氣多子五藏各有精精足則隂足而腎者又藏精之所也精足則多子矣婦人癥瘕精充則邪氣消且鹹能輭堅也久服輕身精足之功此以形質為治也蓯蓉象人之隂而滋潤黏膩故能治前隂諸疾而補精氣如地黄色質象血則補血也防風味甘温主大風頭眩痛惡風風邪風病無不治也目盲無所見風在上竅也風行周身風在徧體也骨節疼痛風在筋骨也煩滿風在上焦也久服輕身風氣除則有此效凡藥之質輕而氣盛者皆屬風藥以風即天地之氣也但風之中人各有經絡而藥之受氣于天地亦各有專能故所治各不同于形質氣味細察而詳分之必有一定之理也防風治周身之風乃風藥之統領也續斷味苦㣲温主傷寒苦温能散寒補不足補傷損之不足金瘡癰傷折跌續筋骨肌肉筋骨有傷皆能治之婦人乳難通滯之功久服益氣力强筋骨也此以形為治續斷有肉有筋如人筋在肉中之象而色帶紫黑為肝腎之色故能補續筋骨又其性直下故亦能降氣以達下焦也決明子味鹹平主青盲目淫膚赤白膜眼赤痛淚出凡目病内外等證無所不治久服益精光不但能治目邪而且能補目之精也皆鹹降清火之功輕身火清則體健也決明生于秋得金氣之正其色極黄得金之色其功專于明目詳上扁青條内夫金之正色白而非黄但白為受色之地乃無色之色耳故凡物之屬金者徃徃借土之色以為色即五金亦以黄金為貴子肖其母也草木至秋感金氣則黄落故諸花實之中凡色黄而耐久者皆得金氣為多者也丹參味苦㣲寒主心腹邪氣赤走心故能逐心腹之邪腸鳴幽幽如走水心與脾不和則鳴寒熱積聚破癥除瘕赤走血凡血病凝結者無不治之止煩滿心氣不舒益氣益心氣此以色為治也赤走心心主血故丹參能走心以治血分之病又辛散而潤澤故能通利而滌邪也五味子味酸温主益氣氣斂則益欬逆上氣肺主氣肺氣斂則欬逆除而氣亦降也勞傷羸瘦補不足氣斂藏則病不侵而身强盛矣强隂氣斂則歸隂益男子精腎主收藏而精者腎之所藏者也故收斂之物無不益腎五味形又似腎故為補腎之要藥此以味為治也凡酸味皆斂而五味酸之極則斂之極極則不止于斂而且能藏矣藏者冬之令屬腎故五味能補腎也蛇床子味苦平主婦人隂中腫痛男子隂痿濕癢皆下體濕毒之病除痺氣利關節除濕痰在筋骨之證癲癎除濕痰在心之證惡瘡亦濕毒所生久服輕身濕去則身輕蛇床生隂濕卑下之地而芬芳燥烈不受隂濕之氣故入于人身亦能于下焦濕氣所歸之處逐其邪而補其正也沙參味苦㣲寒主血積肺氣上逆之血驚氣心火犯肺除寒熱肺家失調之寒熱補中肺主氣肺氣和則氣充而三焦實也益肺氣色白體輕故入肺也久服利人肺氣清和之效肺主氣故肺家之藥氣勝者為多但氣勝之品必偏于燥而能滋肺者又膩滯而不清虚惟沙參為肺家氣分中理血之藥色白體輕疎通而不燥潤澤而不滯血阻于肺者非此不能清也菌桂味辛温主百病言百病用之得宜皆有益也養精神通達藏府益在内也和顔色調暢血脈益在外也為諸藥先聘通使辛香四達引藥以通經絡久服輕身不老血脈通利之效面生光華媚好常如童子血和則潤澤也寒氣之鬱結不舒者惟辛温可以散之桂性温補陽而香氣最烈則不專于補而又能驅逐隂邪凡隂氣所結能與藥相拒非此不能入也人身有氣中之陽有血中之陽氣中之陽走而不守血中之陽守而不走凡藥之氣勝者徃徃補氣中之陽質勝者徃徃補血中之陽如附子煖血肉桂煖氣一定之理也然氣之陽勝則能動血血之陽勝則能益氣又相因之理也桂氣分藥也而其騐則見于血其義不曉然乎松脂味苦温主疽惡瘡頭瘍白禿疥瘙除濕火所化之病風氣香散風安五藏補脂液除熱性耐寒暑久服輕身不老延年松多脂而壽故也松之精氣在皮故其脂皆生于皮其質黏膩似濕而性極燥故凡濕熱之在皮膚者皆能治之凡癰疽瘡疥之疾皆皮膚濕火所鬱必腐肉傷皮流膿結痂而後愈松之皮日易月新脂從皮出全無傷損感其氣者即成膿脫痂而愈義取其象之肖也槐實味苦寒主五内邪氣熱清浮遊不歸根之火止涎唾清肺經濕火補絶傷陽明主機關此能滋養陽明也五痔火瘡婦人乳瘕皆陽明燥金之痰子藏急痛亦陽明經脈之病槐當秋而實得金之令色黄得金之色故其性體清肅乃手太隂手陽明之要藥也金衰則為火所侮凡有餘之火不能歸藏其宅必犯肺與大腸得此清肅之氣以助之則火不能傷而自歸其宅不治火而火自退此從本之治醫之良法也柏實味甘平主驚悸清心經之遊火安五藏滋潤之功益氣壯火食氣火寧則氣益也除風濕痺得秋金之令能燥濕平肝也久服令人潤澤美色耳目聰明滋潤皮膚及諸竅不飢不老輕身延年柏之性不假灌溉而能壽也柏得天地堅剛之性以生不與物變遷經冬彌翠故能寧心神斂心氣而不為邪風遊火所侵剋也人之生理謂之仁仁藏于心物之生機在于實故實亦謂之仁凡草木之仁皆能養心氣以類相應也茯苓古注茯苓皆云松脂入地所結無苗葉花實今之茯苓皆有蔓可種疑古今有異同也味甘平主胷脇逆氣憂恚驚邪恐悸心下結痛寒熱煩滿欬逆皆脾虚不能化水痰飲留結諸經之疾口焦舌乾胷有飲則水下聚而津液不升利小便淡滲利水道久服安魂養神不飢延年心脾和通之效茯苓生山谷之中得松柏之餘氣其味極淡故為調補脾隂之藥義見石斛條下凡人邪氣鬱結津液不行則為痰為飲痰濃稠為火之所結飲清稀為水之所停故治痰則鹹以降之治飲則淡以利之若投以重劑反拒而不相入惟茯苓極輕淡屬土土勝水能疎之滌之令從膀胱以出病漸去而不覺也觀仲景豬苓湯五苓散等方義自見矣蘗木味苦寒主五藏腸胃中結熱黄疸腸痔止洩痢女子漏下赤白隂陽蝕瘡皆陽明表裏上下所生濕熱之疾黄蘗極黄得金之色故能清熱其味極苦苦屬火則又能燥濕凡燥者未有不熱而寒者未有不濕惟黄柏于清熱之中而兼燥濕之效蓋黄色屬金陽明為燥金故其治皆除陽明濕熱之疾氣類相感也乾漆味辛温主絶傷補中續筋骨填髓腦補續筋骨中之脂膏安五藏實藏中之脂膏五緩六急調和筋骨風寒濕痺漆得寒反堅得濕反燥故能除寒熱也生漆去長蟲生漆著人肌膚即腐爛故亦能腐蟲久服輕身耐老漆入地不朽其質耐久故有此效此以質為治漆樹脂也凡草木之脂最韌而不朽者莫如漆人身中非氣非血而能充養筋骨者皆脂膏也氣血皆有補法而脂膏獨無補法則以樹之脂膏力最厚者補之而脂膏之中凡風寒濕熱之邪留而不去者得其氣以相助亦并能驅而滌之也辛夷味辛温主五藏身體寒熱清氣下陷之疾風頭腦痛升散風邪面䵟去皮毛之風滯久服下氣輕身明目増年耐老清氣上升則濁氣下降而百體清寧可永年矣辛夷與衆木同植必髙于衆木而後已其性專于向上故能升達清氣又得春氣之最先故能疎達肝氣又芳香清烈能驅逐邪風頭目之病藥不能盡達者此為之引也桑上寄生味苦平主腰痛得桑之氣亦能助筋骨也小兒背强驅脊間風癰腫和血脈安胎胎亦寄母腹者也充肌膚堅髪齒長鬚眉養皮毛之血脈其實主明目桑性驅風肝為風藏而開竅于目風去則目明也輕身通神寄生乃感風露之氣以生故服之亦有清虚之妙應寄生乃桑之精氣所結復生小樹于枝間有子之象焉故能安胎其性與桑相近故亦能驅風養血其生不著土資天氣而不資地氣故能滋養血脈于空虚之地而取效更神也杜仲味辛平主腰脊痛補中益精氣堅筋骨强志其質堅韌者其精氣必足故亦能堅定人身之筋骨氣血也除隂下癢濕補皮利濕小便餘瀝堅溺管之氣久服輕身耐老强健肢體杜仲木之皮木皮之韌且厚者此為最故能補人之皮又其中有絲連屬不斷有筋之象焉故又能續筋骨因形以求理則其效可知矣髮髲味苦温主五癃關格不通利小便水道滑潤疎通之效療小兒癎大人痓仍自還神化滋養脈絡髪為血之餘而經中所治之疾皆主通經利便之功何也蓋心與小腸為表裏心主血髪為血之餘則不能入心而能入小腸以小腸為心之出路也且髪亦毛類肺主皮毛而為水源故能利水非一定之理乎其治癎痓則瀉心家之痰飲及滋潤血脈之功也金匱要畧方治小便閉淋用滑石亂髪知用藥悉遵本經者惟仲景一人而已龍骨味甘平主心腹鬼疰精物老魅純陽能制隂邪欬逆斂氣滌飲洩痢膿血女子漏下收澀之功癥瘕堅結龍性善入能穿破積滯小兒熱氣驚癎斂火安神齒主小兒大人驚癎癲疾狂走與骨同義但齒則屬腎屬骨皆主閉藏故于安神凝志之效尤多心下結氣不能喘息收降上焦遊行之逆氣諸痙心經痰飲殺精物義亦與骨同久服輕身通神明延年龍能飛騰變化且多壽故有此效龍得天地純陽之氣以生藏時多見時少其性至動而能靜故其骨最黏澀能收斂正氣凡心神耗散腸胃滑脫之疾皆能巳之陽之純者乃天地之正氣故在人身亦但斂正氣而不斂邪氣所以仲景于傷寒之邪氣未盡者亦用之後之醫者于斯義蓋未之審也人身之神屬陽然神非若氣血之有形質可補瀉也故治神為最難龍者乗天地之元陽出入而變化不測乃天地之神也以神治神則氣類相感更佐以寒熱温涼補瀉之法雖無形之病不難治矣天地之陽氣有二一為元陽之陽一為隂陽之陽隂陽之陽分于太極既判之時以日月為升降而水火則其用也與隂為對待而不併于隂此天地並立之義也元陽之陽存于太極未判之時以寒暑為起伏而雷雨則其用也與隂為附麗而不雜于隂此天包地之義也龍者正天地元陽之氣所生藏于水而不離乎水者也故春分陽氣上井泉冷龍用事而能飛秋分陽氣下井泉温龍退蟄而能潛人身五藏屬隂而腎尤為隂中之至隂凡周身之水皆歸之故人之元陽藏焉是腎為藏水之藏而亦為藏火之藏也所以隂分之火動而不藏者亦用龍骨蓋借其氣以藏之必能自反其宅也非格物窮理之極者其孰能與于斯麝香味辛温主辟惡氣香氣盛則穢氣除殺鬼精物香能勝邪温瘧香散邪風蠱毒香能殺蟲癎痓香通經絡去三蟲蟲皆濕穢之所生故亦能除之久服除邪不夢寤魘寐魘寐由心氣閉塞而成香氣通達則無此患此以氣為治麝喜食香草其香氣之精結于臍内為諸香之冠香者氣之正正氣盛則自能除邪辟穢也牛黄味苦平主驚癎通心化痰寒熱熱盛狂痓清心家之熱痰除邪逐鬼心氣旺則邪氣自不能容也牛之精氣不能運于周身則成黄牛屬土故其色黄也凡治痰涎皆以補脾為主牛肉本能健脾化痰而黄之功尤速又黄必結于心下故又能入手少隂厥隂之分以驅邪滌飲而益其精氣也白膠味甘平主傷中勞絶腰痛羸瘦皆骨節虚寒之證補中益氣補血則中氣自足也婦人血閉無子止痛安胎補衝脈血海之功久服輕身延年精足血滿故有此效鹿之精氣全在于角角本下連督脈鹿之角于諸獸為最大則鹿之督脈最盛可知故能補人身之督脈督脈為周身骨節之主腎主骨故又能補腎角之中皆貫以血衝為血海故又能補衝脈衝督盛而腎氣强則諸效自臻矣阿膠味甘平主心腹内崩血脫之疾勞極洒洒如瘧狀勞倦則脾傷而血虧此肝脾之寒熱故如瘧也腰腹痛四肢酸疼血枯之疾女子下血安胎養血則血自止而胎安久服輕身益氣補血則氣亦充阿井為濟水之伏流濟之源為沇水自沇水以至于阿井伏見不常若夏書所謂溢為滎出于陶丘北者皆伏流從下汎上者也阿井在陶丘北三百里泉雖流而不上汎尤為伏脈中之靜而沉者過此則其水皆上汎成川且與他泉水亂而不純矣故阿井之水較其旁諸水重十之一二不等人之血脈宜伏而不宜見宜沉而不宜浮以之成膠真止血調經之上藥也其必以驢皮煎者驢肉能動風肝為風藏而藏血乃借風藥以引入肝經也又凡皮皆能補脾脾為後天生血之本而統血故又為補血藥中之聖品丹雄雞味甘微温主女人崩中漏下赤白沃補肺疎肝補虚温中止血滋養血脈頭主殺鬼雞得清肅之氣而頭為之㑹故能除鬼邪東門上者尤良東門上者東門上所磔雞頭取陽方之生氣也肶胵裹黄皮微寒主洩利雞食砂石亦能消化故治食積不化之洩利屎白主消渴雞善食而不善飲其腸胃不能容水故主消渴傷寒寒熱治傷寒有食邪之寒熱凡血肉之物鮮屬金者惟雞于十二支屬酉而身輕能飛其聲嘹亮于五音屬商乃得金氣之清虚者也五藏之氣木能疎土金能疎木雞屬金故能疎達肝氣本血肉之物故又能不尅伐而調養肝血也石蜜石蜜野蜂于崖間石隙中采花所作也疑古時未有養蜂之法則以崖蜜為上而土木中之蜜不用今人養蜂收蜜其法最良功同石蜜也味甘平主心腹邪氣養胃和中諸驚癎痓定心平肝安五藏諸不足益氣補中百花之精藏府經絡皆受益也止痛甘能緩痛解毒香能辟穢惡之毒除衆病諸花之性俱全和百藥諸花之性俱化久服强志輕身不飢不老精神充足故也蜜者采百花之精華而成者也天地春和之氣皆發于草木草木之和氣皆發于花花之精英釀而為蜜和合衆性則不偏委去糟粕則不滯甘以養中香以理氣真養生之上品也但其性極和平于治疾則無速效耳凡天地之生氣皆正氣也天地之死氣皆邪氣也正則和平邪則有毒毒者敗正傷生之謂蜜本百花之蘂乃生氣之所聚生氣旺則死氣不能犯此解毒之義也桑螵蛸味鹹平主傷中疝瘕瘀血凝結中焦隂痿益精生子補益腎氣女子血閉和通血脈腰痛强腎之經通五淋利小便水道通腎之府桑螵蛸桑上螳螂所生之子也螳螂于諸蟲中最有力而其子最繁則其腎之强可知人之有子皆本于腎以子補腎氣相從也桑性最能續傷和血螵蛸在桑者亦得桑之性故有養血逐瘀之功藕實莖一氣相通莖與實無異非若他藥之根實各殊也味甘平主補中味甘淡得中土之性養神氣香而中虚益氣力脾腎旺則氣血强除百疾中和之性無偏雜之害也久服輕身耐老不飢延年和平之效藕者水土之精也故能養脾腎之隂生水底汚泥之中而無處不香無節不通故又能疎達脾腎之氣而滋其血脈濕而不滯香而不燥果中之聖品也橘柚味辛温主胸中瘕熱逆氣開達上焦之氣利水穀通利中焦之滯久服去臭下氣通神芳香辛烈自能辟穢邪而通正氣也橘柚通體皆香而皮辛肉酸乃肝脾通氣之藥也故凡肝氣不舒尅賊脾土之疾皆能已之凡辛香之藥皆上升橘柚實酸酸主斂故又能降氣不專于散氣也大棗味甘平主心腹邪氣安中養脾建立中氣則邪氣自除助十二經平胃氣十二經皆受津液于脾胃脾胃盛則十二經皆充也通九竅補而不滯補少氣少津液身中不足周身氣血無不補也大驚甘能緩急四肢重脾虚則重旺則輕也和百藥百藥氣味不齊而甘能調之久服輕身長年皆補益後天之功棗味甘而肉厚色赤得火之色土之味故能建立中焦温養脾胃為後天之本萬物生于土土氣充盈諸經自皆受益矣葡萄味甘平主筋骨濕痺益氣倍力强筋燥濕强志肝藏魂令人肥健耐飢忍風寒久服輕身不老延年皆培補肝脾之效可作酒此以形為治葡萄屈曲蔓延冬卷春舒與筋相似故能補益筋骨其實甘美得土之正味故又能滋養肌肉肝主筋脾主肉乃肝脾交補之藥也雞頭實味甘平主濕痺腰脊膝痛下焦濕痰之疾補中除暴疾暴疾皆生于中氣不足中氣足則無此疾矣益精氣强志肝腎足則心氣亦寧也令耳目聰明充益諸竅久服輕身不飢耐老神仙脾腎兼旺則諸效自臻矣雞頭生于水中而其實甘淡得土之正味乃脾腎之藥也脾惡濕而腎惡燥雞頭雖生水中而淡滲甘香則不傷于濕質黏味澀而又滑澤肥潤則不傷于燥凡脾腎之藥徃徃相反而此則相成故尤足貴也中品石硫黄味酸温主婦人隂蝕隂濕所生之疾惟陽燥之物能已之疽痔惡血亦下焦隂分之濕所生病也堅筋骨壯筋骨之陽氣除頭禿殺髮根濕氣所生之蟲能化金銀銅鐵竒物火剋金也硫黄乃石中得火之精者也石屬隂而火屬陽寓至陽于至隂故能治隂分中寒濕之疾其氣旺而性暴故又能殺蟲而化諸金也水銀味辛寒主疥瘻痂瘍白禿殺皮膚中蝨解皮毛中濕熱之毒蝨亦濕熱所生也墮胎至重能墮胎又胎氣始生肝氣養之金剋木則傷肝而胎墮也除熱殺金銀銅錫毒得五金之精氣故能除其毒也鎔化還復為丹水銀出于丹砂中者為多故亦可鍊成丹石金精得火變化不測鉛汞皆如此久服神仙不死以其不朽而能變化也水銀五金之精也得五金之精氣而未成質鍊之亦能為金銀等物其所治皆皮膚熱毒之疾蓋肺屬金而主皮毛亦以氣相感也丹家爐鼎之術以水銀與鉛為龍虎合鍊成丹服之則能長生久視飛昇羽化自參同契以後其說紛紛髙明之士為所悞者不一而足夫水銀乃五金之精而未成金體者也凡金無不畏火惟水銀則百鍊如故以其未成金質中含水精故火不得而傷之其能㸃化為黄白者亦因藥物所鍊變其外貌非能真作金銀也今乃以其質之不朽欲借其氣以固形體真屬支離蓋人與萬物本為異體借物之氣以攻六邪理之所有借物之質以永性命理之所無術士好作聰明談天論易似屬可聽實則伏羲畫卦列聖繫辭何嘗有長生二字此乃假託大言以愚小智其人已死詭云尚在試其術者破家喪身未死則不悟既死則又不知歴世以來昧者接踵總由畏死貪生之念迫于中而反以自速其死耳悲夫磁石味辛寒主周痺風濕肢節中痛不可持物洒洒酸消味辛則散風石性燥則除濕其治酸痛等疾者以其能堅筋骨中之正氣則邪氣自不能侵也除大熱寒除熱煩滿重降逆及耳聾腎火炎上則耳聾此能降火歸腎凡五行之中各有五行所謂物物一太極也如金一行也銀色白屬肺金色赤屬心銅色黄屬脾鉛色青屬肝鐵色黑屬腎石也者金土之雜氣而得金之體為多何以騐之天文家言星者金之散氣而星隕即化為石則石之屬金無疑而石之中亦分五金焉磁石乃石中鐵之精也故與鐵同氣而能相吸鐵屬腎故磁石亦補腎腎主骨故磁石堅筋壯骨腎屬冬令主收藏故磁石能收斂正氣以拒邪氣知此理則凡藥皆可類推矣陽起石味鹹微温主崩中漏下寒滑之病破子藏中血癥瘕結氣寒熱腹痛無子凡寒凝血滯之病皆能除之隂痿不起補不足强腎補陽益氣陽起石得火不然得日而飛硫黄得日無焰得火而發皆為火之精而各不同蓋陽起石禀日之陽氣以成天上陽火之精也硫黄稟石之陽氣以成地上隂火之精也所以硫黄能益人身隂火之陽陽起石能益人身陽火之陽也五行各有隂陽亦可類推乾薑味辛温主胸滿寒邪之在胸者則散之欬逆上氣辛能潤肺降逆温中止血血得暖而歸經出汗辛能散逐寒氣使從汗出逐風濕痺治寒邪之在筋骨者腸澼下痢治寒邪之在腸胃者生者尤良辛散之品尤取其氣性之清烈也久服去臭氣通神明辛甚氣烈故能辟穢通陽凡味厚之藥主守氣厚之藥主散乾薑氣味俱厚故散而能守夫散不全散守不全守則旋轉于經絡藏府之間驅寒除濕和血通氣所必然矣故性雖猛峻而不妨服食也苦參味苦寒主心腹結氣苦入心以散熱結之氣癥瘕積聚苦極則能洩黄疸寒能除鬱熱溺有餘瀝心通于小腸心火除則小腸鬱塞之氣通矣逐水小腸通則水去除癰腫諸瘡皆屬心火心火清則癰腫自去也補中内經云脾苦濕急食苦以燥之即此義也明目止淚寒清肝火苦除肝濕此以味為治也苦入心寒除火故苦參專治心經之火與黄連功用相近但黄連似去心藏之火為多苦參似去心府小腸之火為多則以黄連之氣味清而苦參之氣味濁也當歸味甘温主欬逆上氣潤肺氣温瘧寒熱洒洒在皮膚中皆風寒在血中之病婦人漏下絶子營血不足之病諸惡瘡瘍金瘡營血火鬱及受傷之病煮飲之煮飲則能四達以行諸經按血在經絡之中流行不息故凡用行血補血之藥入湯劑者為多入丸散者絶少故古人治病不但方不可苟即法亦不可易也當歸辛香而潤香則走脾潤則補血故能透入中焦營氣之分而為補營之聖藥當歸為血家必用之藥而本經無一字及于補血養血者何也蓋氣無形可驟生血有形難速長凡通閉順氣和隂清火降逆生津去風利竅一切滋潤通和之品皆能令隂氣流通不使亢陽致害即所以生血也當歸辛芳温潤兼此數長實為養血之要品惟著其血充之效則血之得所養不待言而可知此等當參全經而悟其理麻黄味苦温主中風傷寒頭痛温瘧發表出汗去邪熱氣凡風寒之在表者無所不治以能驅其邪使皆從汗出也止欬逆上氣輕揚能散肺邪除寒熱散營衛之外邪破癥堅積聚散藏府之内結麻黄輕揚上達無氣無味乃氣味之最清者故能透出皮膚毛孔之外又能深入積痰凝血之中凡藥力所不到之處此能無㣲不至較之氣雄力厚者其力更大蓋出入于空虚之地則有形之氣血不得而禦之也芍藥味苦主邪氣腹痛肝氣乗脾則痛斂肝氣則痛除除血痺肝邪凝滯之病破堅積寒熱疝瘕肝邪結聚之疾止痛血和則痛止利小便肝氣下達于宗筋故小便亦利益氣肝氣斂則受益􅆚藥花大而榮得春氣為盛而居百花之殿故能收拾肝氣使歸根反本不至以有餘肆暴犯肺傷脾乃養肝之聖藥也𤣥參味苦㣲寒主腹中寒熱積聚皆火氣凝結之疾女子産乳餘疾産後血虧衝脈之火易動清血中之火則諸疾平矣補腎氣令人目明除隂分之火則頭目清明矣𤣥參色黑屬腎而性寒故能除腎家浮遊上升之火但腎火有陽有隂陽火發于氣分火盛則傷氣内經所謂壯火食氣是也隂火發于血分火盛則傷血内經所謂諸寒之而熱者取之隂是也産後血脫則隂衰而火無所制又不可以寒涼折之氣血未寧又不能納峻補之劑維𤣥參寧火而帶㣲補用之最為的當也百合味甘平主邪氣腹脹心痛肺氣不舒之疾利大小便肺為水源補中甘能補脾益氣肺主氣補肺則氣益矣此以形為治也百合色白而多瓣其形似肺始秋而花又得金氣之全者故為清補肺金之藥白芷味辛温主女人漏下赤白血閉隂腫風在下焦而兼濕熱之證寒熱風在營衛風頭侵目涙出風在上竅長肌膚潤澤可作面脂風氣乾燥風去則肌肉生而潤澤矣凡驅風之藥未有不枯耗精液者白芷極香能驅風燥濕其質又極滑潤能和利血脈而不枯耗用之則有利無害者也蓋古人用藥既知藥性之所長又度藥性之所短而後相人之氣血病之標本參合研求以定取舍故能有顯效而無隱害此學者之所當殫心也黄芩味苦平主諸熱黄疸大腸經中之鬱熱腸澼洩痢大腸府中之鬱熱逐水水在腸中者下血閉血之在陽明者使從大便出惡瘡疽蝕火瘍陽明主肌肉凡肌肉熱毒等病此皆除之此以形色為治黄芩中空而色黄為大腸之藥故能除腸胃諸熱病黄色屬土屬脾大腸屬陽明燥金而黄芩之黄屬大腸何也蓋胃與大腸為出納水榖之道皆統于脾又金多借土之色以為色義詳決明條下相參益顯也狗脊味苦平主腰背强機闗緩急周痺寒濕膝痛凡邪氣之在骨節間者皆能治之頗利老人老人精血衰則筋骨空隙中尤不能舒展故于此藥為尤宜也此以形為治狗脊徧體生毛而多節頗似狗之脊諸獸之中惟狗狡㨗而此藥似之故能入筋骨機關之際去其凝滯寒濕之氣而使之强健利捷也形同而性亦近物理蓋可推矣紫草味苦寒主心腹邪氣去心腹熱邪五疸濕熱在血中補中益氣營家之熱清則中焦和利利九竅諸竅不為邪熱所閉通水道心氣通于小腸紫草色紫而走心心主血又其性寒故能治血家之熱水萍味辛寒主暴熱得水之氣故能除熱身癢濕熱在皮膚下水氣萍入水不濡故能滌水勝酒水氣勝則酒氣散矣長鬚髮益皮毛之血氣主消渴得水氣之助久服輕身亦如萍之輕也水萍生于水中而能出水上且其葉入水不濡是其性能敵水者也故凡水濕之病皆能治之其根不著土而上浮水面故又能益皮毛之疾澤蘭味苦㣲温主乳婦内衂清陽明經絡濕熱之邪中風餘疾氣温體輕故能散餘風大腹水腫身面四肢浮腫骨節中水統治内外一切水病金瘡癰腫瘡膿亦皆濕毒之疾澤蘭生于水中而芳香透達節實莖虚能于人經絡受濕之處分疎通利無所隔礙蓋其質隂而氣陽故能行乎人身之隂而發之于陽也牡丹味辛寒主寒熱中風瘈瘲痙驚癎邪氣皆肝氣所發之疾除癥堅瘀血留舍腸胃色赤走血氣香能消散也安五藏五藏皆血氣所留止血氣和則無不利矣療癰瘡清血家之毒火牡丹為花中之王乃木氣之最榮澤者故能疎養肝氣和通經脈與􅆚藥功頗近但􅆚藥㣲主斂而牡丹㣲主散則以􅆚藥味勝牡丹氣勝味屬隂而氣屬陽也呉茱茰味辛温主温中下氣風寒上逆止痛散寒濕之痛欬逆寒熱寒邪入肺除濕血痺辛能燥濕温能行血也逐風邪開腠理辛香散風通竅呉茱茰味極辛辛屬金金平木故為驅逐肝風之要藥但肝風有二一為挾寒之風一為挾火之風呉茱茰性温于挾寒之風為宜此又不可不審也梔子味苦寒主五内邪氣熱邪之氣胃中熱氣黄色入陽明性寒能清熱面赤酒皰皶鼻白癩赤癩瘡瘍此皆肌肉之病乃陽明之表證也梔子正黄亦得金色故為陽明之藥但其氣體輕虚走上而不走下故不入大腸而入胃胃在上焦故也胃家之藴熱惟此為能除之又胃主肌肉肌肉有近筋骨者有近皮毛者梔子形開似肺肺主皮毛故專治肌肉熱毒之見于皮毛者也鹿茸味甘温主漏下惡血血中之陽不能固攝寒熱陽虚驚癎心火虧少益氣强志補血之功生齒不老補腎之效角主惡瘡癰腫拓血中之毒逐邪惡氣拓隂邪之氣留血在隂中隂絡之凝滯得熱而運行也鹿茸之中惟一㸃胚血不數日而即成角此血中有真陽一㸃通督脈貫腎水乃至靈至旺之物也故入于人身為峻補陽血之要藥又其物流動生發故又能逐瘀通血也餘義見白膠條下鹿茸氣體全而未發洩故補陽益血之功多鹿角則透發已盡故拓毒消散之功勝先後遲速之間功效輒異非明乎造化之機者不能測也犀角犀有山犀水犀二種而水犀為妙味苦寒主百毒蠱疰殺邪氣之蟲邪鬼靈氣辟邪瘴氣鬱熱之毒殺鉤吻鴆羽蛇毒除邪一切草木蟲鳥之毒皆除之不迷惑魘寐解心經熱邪通心氣牛屬土而犀則居水水無獸惟犀能伏其中則其得水土之精可知凡物之毒者投水土則毒自化犀得水土之精故化毒之功為多而其角中虚有通靈之象故又能養心除邪也伏翼味鹹平主目瞑明目夜視有精光存養肝經隂氣之精久服令人喜樂媚好無憂肝氣和則樂凡有翼能飛之物夜則目盲伏翼又名天鼠即鼠類也故日出則目瞑而藏日入則目明而出乃得隂氣之精者也肝屬厥隂而開竅于目故資其氣以養肝血而濟目力感應之理也物有殊能必有殊氣皆可類推蚱蟬古人用蟬今人用蛻氣性亦相近味鹹寒主小兒驚癎夜啼癲病寒熱皆小兒風熱之疾蚱蟬感涼風清露之氣以生身輕而聲嘹亮得金氣之發揚者也又脫落皮殻亦屬人身肺經之位故其性能清火驅風而散肺經之鬱氣若其質輕虚尤與小兒柔弱之體為宜也蚱蟬日出有聲日入無聲止夜啼取其意也白殭蠶味鹹主小兒驚癎夜啼風痰之病去三蟲風氣所生之蟲滅黑䵟令人面色好能去皮膚之風斑令潤澤男子隂瘍病下體風濕蠶食桑之蟲也桑能治風養血故其性亦相近殭蠶感風而殭凡風氣之疾皆能治之蓋借其氣以相感也殭蠶因風以殭而反能治風者何也蓋邪之中人也有氣而無形穿經透絡愈久愈深以氣類相反之藥投之則拒而不入必得與之同類者和入諸藥使為鄉道則藥力至于病所而邪與藥相從藥性漸發邪或從毛空出或從二便出不能復留矣此即從治之法也風寒暑濕莫不皆然此神而明之之道不專恃正治奏功也下品附子味辛温主風寒欬逆邪氣寒邪逆在上焦温中除中焦之寒金瘡血肉得暖而合破癥堅積聚血瘕寒氣凝結血滯于中得熱乃行也寒濕踒躄拘攣膝痛不能行步此寒邪之在下焦筋骨間者凡有毒之藥性寒者少性熱者多寒性和緩熱性峻速入于血氣之中剛暴駁烈性發不支藏府嬌柔之物豈能無害故須審愼用之但熱之有毒者速而易見而寒之有毒者緩而難察尤所當慎也半夏味辛平主傷寒寒熱寒熱之在肺胃間者心下堅下氣辛能開肺降逆喉咽腫痛頭眩開降上焦之火胸脹欬逆腸鳴氣降則通和故能愈諸疾止汗澀斂肺氣半夏色白而味辛故能為肺經燥濕之藥肺屬金喜斂而不喜散蓋斂則肺葉垂而氣順散則肺葉張而氣逆半夏之辛與薑桂之辛迥别入喉則閉不能言塗金瘡則血不復出辛中帶澀故能疎而又能斂也又辛之斂與酸之斂不同酸則一主于斂辛則斂之中有發散之意尤與肺投合也大黄味苦寒主下瘀血血閉除血中熱結之滯寒熱血中積滯之寒熱破癥瘕積聚凡腹中邪氣之積無不除之留飲宿食蕩滌腸胃推陳致新凡腹中飲食之積無不除之通利水穀調中化食助腸胃運化之力安和五藏邪積既去則正氣自和大黄色正黄而氣香得土之正氣正色故專主脾胃之疾凡香者無不燥而上升大黄極滋潤達下故能入腸胃之中攻滌其凝結之邪而使之下降乃驅逐停滯之良藥也葶藶味辛寒主癥瘕積聚結氣水飲所結之疾飲食寒熱破堅逐邪亦皆水氣之疾通利水道肺氣降則水道自通葶藶滑潤而香專瀉肺氣肺為水源故能瀉肺即能瀉水凡積聚寒熱從水氣來者此藥主之大黄之瀉從中焦始葶藶之瀉從上焦始故傷寒論中承氣湯用大黄而陷胸湯用葶藶也旋復花味鹹温主結氣脇下滿驚悸除中上二焦結閉之疾除水鹹能潤下去五藏間寒熱五藏留結不通所生之寒熱補中下氣開氣下達皆鹹降之功此以味為治凡草木之味鹹者絶少鹹皆治下鹹而能治上焦者尤少惟此味鹹而治上為中上二焦之藥鹹能輭堅故凡上中二焦凝滯堅結之疾皆能除之凡體輕氣芳之藥徃徃能消寒熱蓋寒熱之疾無不因鬱遏而成内經云火鬱則發之輕芬之體能發散故寒熱除也藜蘆味辛寒主蠱毒味烈殺蟲欬逆洩痢腸澼除濕熱之疾頭瘍疥瘙惡瘡殺諸蟲毒去死肌皆殺蟲之功凡有毒之藥皆得五行剛暴偏雜之性以成人身氣血乃天地中和之氣所結故服毒藥者徃徃受傷瘡疥等疾久而生蟲亦與人身氣血為類故人服之而有傷氣血者必能殺蟲惟用之得其法乃有利而無弊否則必至于兩傷不可不慎也又毒之解毒各有所宜如燥毒之藥能去濕邪寒毒之藥能去火邪辨證施治神而明之非僅以毒攻毒四字可了其義也白芨味苦平主癰腫惡瘡敗疽傷隂死肌解毒生肌胃中邪氣養胃驅邪賊風鬼擊痱緩不收和筋逐風此以質為治白芨氣味冲淡和平而體質滑潤又極黏膩入于筋骨之中能和柔滋養與正氣相調則㣲邪自退也貫衆味苦微寒主腹中邪熱氣寒能除熱諸毒邪熱之毒殺三蟲濕熱所生之蟲貫衆生于山澗之中得天地清隂之氣故能除藴熱濕穢之疾其體中虚而清芳故能解中焦之毒人身之蟲皆濕熱所生濕熱除則諸蟲自消也連翹味苦平主寒熱火氣所鬱之寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱皆肝經熱結之證蠱毒濕熱之蠱凡藥之寒熱温涼有歸氣分者有歸血分者大抵氣勝者治氣味勝者治血連翹之氣芳烈而性清涼故凡在氣分之鬱熱皆能已之又味兼苦辛應秋金之令故又能除肝家留滯之邪毒也夏枯草味苦辛寒主寒熱瘰癧鼠瘻頭瘡火氣所發破癥散癭結氣火氣所結脚腫濕痺濕熱之在下者輕身濕火退則身健也此以物稟之氣候為治又一義也凡物皆生于春長于夏惟此草至夏而枯蓋其性稟純隂得少陽之氣勃然興發一交盛陽隂氣將盡即成熟枯槁故几盛陽留結之病用此為治亦即枯滅此天地感應之妙理也凡藥之以時候榮枯為治者俱可類推水蛭味鹹平主逐惡血瘀血月閉破血瘕積聚諸敗血結滯之疾皆能除之無子惡血留于子宫則難孕利水道水蛭生于水中故也凡人身瘀血方阻尚有生氣者易治阻之久則無生氣而難治蓋血既離經與正氣全不相屬投之輕藥則拒而不納藥過峻又反能傷未敗之血故治之極難水蛭最喜食人之血而性又遲緩善入遲緩則生血不傷善入則堅積易破借其力以攻積久之滯自有利而無害也桃核仁味苦甘平主瘀血血閉瘕邪氣凡血滯之疾皆除之殺小蟲敗血所生之蟲桃得三月春和之氣以生而花色最鮮明似血故凡血鬱血結之疾不能調和暢達者此能入于其中而和之散之然其生血之功少而去瘀之功多者何也蓋桃核本非血類故不能有所補益若瘀瘕皆已敗之血非生氣不能流通桃之生氣皆在于仁而味苦又能開洩故能逐舊而不傷新也神農本草經百種録
